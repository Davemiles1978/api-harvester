services:
  # Main harvester - runs 24/7
  - type: worker
    name: api-harvester
    runtime: python
    repo: https://github.com/Davemiles1978/api-harvester
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python harvester.py
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: dmai-redis
          property: connectionString
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: dmai-harvester-db
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false

  # Validator - runs hourly
  - type: cron
    name: api-validator
    runtime: python
    repo: https://github.com/Davemiles1978/api-harvester
    branch: main
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python validator.py
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: dmai-harvester-db
          property: connectionString
      - key: ENCRYPTION_KEY
        fromService:
          type: worker
          name: api-harvester
          property: env  # This shares the ENCRYPTION_KEY from the harvester

  # Redis for deduplication
  - type: redis
    name: dmai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Empty list means private network only

  # PostgreSQL database
  - type: pserv
    name: dmai-harvester-db
    runtime: image
    image:
      url: postgres:15
    plan: starter
    disk:
      name: data
      mountPath: /var/lib/postgresql/data
      sizeGB: 5
    envVars:
      - key: POSTGRES_DB
        value: harvester
      - key: POSTGRES_USER
        value: dmai
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Persistent disk (mounted to harvester)
  - type: pserv
    name: dmai-key-storage
    runtime: image
    image:
      url: alpine:latest
    plan: free
    disk:
      name: keys
      mountPath: /storage
      sizeGB: 1
