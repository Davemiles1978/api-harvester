services:
  # Main harvester - runs 24/7
  - type: worker
    name: api-harvester
    runtime: python
    repo: https://github.com/Davemiles1978/api-harvester
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python harvester.py
    envVars:
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dmai-harvester-db
          property: connectionString

  # Validator - runs hourly
  - type: cron
    name: api-validator
    runtime: python
    repo: https://github.com/Davemiles1978/api-harvester
    branch: main
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python validator.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dmai-harvester-db
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false  # Will set manually same as harvester

  # PostgreSQL database - using Render's managed PostgreSQL
  - type: postgres
    name: dmai-harvester-db
    plan: free
    databaseName: harvester
    user: dmai
