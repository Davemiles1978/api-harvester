services:
  # Main harvester - runs 24/7
  - type: worker
    name: api-harvester
    runtime: python
    repo: https://github.com/Davemiles1978/api-harvester
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python harvester.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dmai-harvester-db
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false

  # Validator - runs hourly
  - type: cron
    name: api-validator
    runtime: python
    repo: https://github.com/Davemiles1978/api-harvester
    branch: main
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python validator.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dmai-harvester-db
          property: connectionString
      - key: ENCRYPTION_KEY
        fromEnvVar:
          name: ENCRYPTION_KEY
          fromService: api-harvester

  # PostgreSQL database
  - type: pserv
    name: dmai-harvester-db
    runtime: image
    plan: free
    image:
      url: postgres:15-alpine
    envVars:
      - key: POSTGRES_DB
        value: harvester
      - key: POSTGRES_USER
        value: dmai
      - key: POSTGRES_PASSWORD
        generateValue: true
    disk:
      name: data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
